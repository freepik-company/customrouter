apiVersion: customrouter.freepik.com/v1alpha1
kind: CustomHTTPRoute
metadata:
  labels:
    app.kubernetes.io/name: customrouter
    app.kubernetes.io/managed-by: kustomize
  name: example-routes
spec:
  # Target identifies which external processor will handle these routes
  # The external processor should be started with --target-name=default
  targetRef:
    name: default

  hostnames:
    - www.example.com
    - example.com

  # Path prefixes (languages, regions, etc.)
  # Automatically prepended to the paths defined in the rules
  # max 100 values
  pathPrefixes:
    values: [es, fr, it, de, pt, ja, ko]
    policy: Optional  # Optional | Required | Disabled
    # expandMatchTypes controls which match types are expanded with path prefixes.
    # When omitted, all types are expanded. Example: only expand PathPrefix and Exact:
    # expandMatchTypes: [PathPrefix, Exact]

  # catchAllRoute (optional) configures automatic generation of catch-all virtual hosts
  # for this route's hostnames. When specified, the operator generates an EnvoyFilter that
  # creates default routes, allowing CustomHTTPRoute to handle requests without requiring
  # a base HTTPRoute to be configured separately.
  #
  # The hostnames are taken from spec.hostnames above.
  catchAllRoute:
    backendRef:
      name: default
      namespace: web
      port: 80

  # Routing rules (max 100 rules per CustomHTTPRoute)
  rules:
    # ====================
    # BASIC ROUTING
    # ====================

    # Simple PathPrefix match (default, fastest)
    # max 50 matches per rule
    - matches:
        - path: /calendar/halloween
        - path: /collection
      backendRefs:
        - name: web-en
          namespace: web
          port: 80

    # Exact match with high priority
    - matches:
        - path: /health
          type: Exact
          priority: 2000
      backendRefs:
        - name: health
          namespace: infra
          port: 8080
      pathPrefixes:
        policy: Disabled

    # Exact match with expandMatchTypes override at rule level
    # This rule only expands PathPrefix matches; Exact matches stay literal
    - matches:
        - path: /user/me
          type: Exact
        - path: /user
      backendRefs:
        - name: users-api
          namespace: backend
          port: 8080
      pathPrefixes:
        policy: Optional
        expandMatchTypes: [PathPrefix]

    # Regex match (Go regexp syntax)
    - matches:
        - path: ^/users/[0-9]+/profile$
          type: Regex
          priority: 1500
      backendRefs:
        - name: users-api
          namespace: backend
          port: 8080
      pathPrefixes:
        policy: Disabled

    # ====================
    # REDIRECTS (SEO, migrations)
    # ====================
    # Note: backendRefs is not required for redirect rules

    # Permanent redirect (301) - old URL to new URL
    - matches:
        - path: /old-page
          type: Exact
          priority: 2000
      actions:
        - type: redirect
          redirect:
            path: /new-page
            statusCode: 301
      pathPrefixes:
        policy: Disabled

    # Redirect HTTP to HTTPS
    - matches:
        - path: /secure
          priority: 1800
      actions:
        - type: redirect
          redirect:
            scheme: https
            statusCode: 301
      pathPrefixes:
        policy: Disabled

    # Redirect to different domain
    - matches:
        - path: /blog
          type: PathPrefix
          priority: 1700
      actions:
        - type: redirect
          redirect:
            hostname: blog.example.com
            path: ${path}
            statusCode: 302
      pathPrefixes:
        policy: Disabled

    # Redirect with path transformation using segments
    # /products/123/reviews -> /v2/items/123/feedback
    - matches:
        - path: ^/products/([0-9]+)/reviews$
          type: Regex
          priority: 1600
      actions:
        - type: redirect
          redirect:
            path: /v2/items/${path.segment.1}/feedback
            statusCode: 301
      pathPrefixes:
        policy: Disabled

    # ====================
    # URL REWRITES
    # ====================
    # For PathPrefix matches, rewrite replaces only the matched prefix
    # and preserves the remaining path suffix and query parameters.
    # For Exact/Regex matches, rewrite replaces the entire path.

    # Prefix rewrite: /public-blog/post/42?v=2 -> /internal/cms/blog/post/42?v=2
    - matches:
        - path: /public-blog
          type: PathPrefix
      actions:
        - type: rewrite
          rewrite:
            path: /internal/cms/blog
      backendRefs:
        - name: cms
          namespace: backend
          port: 8080
      pathPrefixes:
        policy: Disabled

    # Prefix rewrite with hostname: /legacy-api/users/1 -> /v2/api/users/1
    - matches:
        - path: /legacy-api
          type: PathPrefix
      actions:
        - type: rewrite
          rewrite:
            path: /v2/api
            hostname: api-internal.example.svc.cluster.local
      backendRefs:
        - name: api-v2
          namespace: backend
          port: 8080
      pathPrefixes:
        policy: Disabled

    # Explicit replacePrefixMatch: force full rewrite on a PathPrefix match
    # /old-service/anything -> /v2 (suffix discarded)
    - matches:
        - path: /old-service
          type: PathPrefix
      actions:
        - type: rewrite
          rewrite:
            path: /v2
            replacePrefixMatch: false
      backendRefs:
        - name: new-service
          namespace: backend
          port: 8080
      pathPrefixes:
        policy: Disabled

    # ====================
    # HEADER MANIPULATION
    # ====================

    # Add tracing and authentication headers
    - matches:
        - path: /api/v1
          type: PathPrefix
      actions:
        - type: header-set
          header:
            name: X-Forwarded-Host
            value: ${host}
        - type: header-set
          header:
            name: X-Real-IP
            value: ${client_ip}
        - type: header-add
          header:
            name: X-Request-ID
            value: ${request_id}
        - type: header-set
          header:
            name: X-Original-URI
            value: ${path}
        - type: header-set
          header:
            name: X-Forwarded-Proto
            value: ${scheme}
        - type: header-remove
          headerName: X-Internal-Debug
      backendRefs:
        - name: api
          namespace: backend
          port: 8080
      pathPrefixes:
        policy: Disabled

    # ====================
    # COMBINED ACTIONS
    # ====================

    # Rewrite + Headers: Internal service routing with full context
    - matches:
        - path: /checkout
          type: PathPrefix
      actions:
        - type: rewrite
          rewrite:
            path: /api/checkout
        - type: header-set
          header:
            name: X-Service-Name
            value: checkout-processor
        - type: header-set
          header:
            name: X-Original-Path
            value: ${path}
        - type: header-set
          header:
            name: X-Client-IP
            value: ${client_ip}
      backendRefs:
        - name: checkout-service
          namespace: commerce
          port: 8080
      pathPrefixes:
        policy: Disabled

    # ====================
    # PRESERVE PREFIX IN REWRITES/REDIRECTS
    # ====================
    # When pathPrefixes expands routes, rewrite/redirect paths are shared
    # across all expanded routes by default, losing the language prefix.
    # Use preservePrefix: true to prepend the prefix to the rewrite/redirect
    # path at expansion time. Only works with PathPrefix and Exact matches.

    # Localized CMS rewrite: the CMS backend needs the language prefix
    # /es/blog/post1 -> /es/cms/blog/post1  (prefix preserved)
    # /fr/blog/post1 -> /fr/cms/blog/post1  (prefix preserved)
    # /blog/post1    -> /cms/blog/post1      (no prefix, unchanged)
    - matches:
        - path: /blog
          type: PathPrefix
      actions:
        - type: rewrite
          rewrite:
            path: /cms/blog
            preservePrefix: true
      backendRefs:
        - name: cms
          namespace: backend
          port: 8080

    # Localized redirect: old path to new path, keeping language
    # /es/old-blog/x -> redirect /es/new-blog (301)
    # /fr/old-blog/x -> redirect /fr/new-blog (301)
    # /old-blog/x    -> redirect /new-blog    (301)
    - matches:
        - path: /old-blog
          type: PathPrefix
      actions:
        - type: redirect
          redirect:
            path: /new-blog
            statusCode: 301
            preservePrefix: true

    # Exact match with preservePrefix
    # /es/about -> rewrite /es/pages/about
    # /fr/about -> rewrite /fr/pages/about
    # /about    -> rewrite /pages/about
    - matches:
        - path: /about
          type: Exact
      actions:
        - type: rewrite
          rewrite:
            path: /pages/about
            preservePrefix: true
      backendRefs:
        - name: web-en
          namespace: web
          port: 80

    # Rewrite with variables + preservePrefix
    # /es/blog/post1 -> /es/cms/${path.segment.2}
    # /fr/blog/post1 -> /fr/cms/${path.segment.2}
    - matches:
        - path: /content
          type: PathPrefix
      actions:
        - type: rewrite
          rewrite:
            path: /cms/${path.segment.1}
            preservePrefix: true
      backendRefs:
        - name: cms
          namespace: backend
          port: 8080

    # preservePrefix with Required policy (only prefixed routes generated)
    # /es/ -> rewrite /es/app
    # /fr/ -> rewrite /fr/app
    # (no unprefixed route)
    - matches:
        - path: /
          type: PathPrefix
      actions:
        - type: rewrite
          rewrite:
            path: /app
            preservePrefix: true
      backendRefs:
        - name: frontend
          namespace: web
          port: 3000
      pathPrefixes:
        policy: Required

    # ====================
    # INLINE {prefix} PLACEHOLDER
    # ====================
    # Use {prefix} anywhere in a Regex pattern to insert the language
    # alternation group at that position instead of at the start of the path.
    # Useful when the locale segment is not the first path component.

    # Framework data routes — locale appears after a dynamic buildId segment
    # With prefixes [es, fr, de] this expands to: ^/_next/data/[^/]+/(es|fr|de)/
    - matches:
        - path: ^/_next/data/[^/]+/{prefix}/
          type: Regex
      backendRefs:
        - name: web-frontend
          namespace: web
          port: 80

    # Static asset locale routes
    # With prefixes [es, fr, de] this expands to: ^/static/locales/(es|fr|de)/
    - matches:
        - path: ^/static/locales/{prefix}/
          type: Regex
      backendRefs:
        - name: cdn
          namespace: assets
          port: 8080

    # Multiple {prefix} placeholders in the same pattern
    # Expands to: ^/(es|fr|de)/data/[^/]+/(es|fr|de)/
    - matches:
        - path: ^/{prefix}/data/[^/]+/{prefix}/
          type: Regex
      backendRefs:
        - name: web-frontend
          namespace: web
          port: 80

    # ====================
    # EXTERNALNAME SERVICES
    # ====================
    # When a backendRef points to a Service of type ExternalName, the controller
    # resolves spec.externalName and uses the real hostname as the backend.
    # This is necessary because Istio does not create clusters for .svc.cluster.local
    # FQDNs of ExternalName services.

    # Route to an external service (ExternalName is resolved automatically)
    - matches:
        - path: /profile
          type: PathPrefix
      backendRefs:
        - name: profile-external  # Service type: ExternalName -> stable.profile.apps.internal
          namespace: web
          port: 80
      pathPrefixes:
        policy: Optional

    # ====================
    # DEFAULT FALLBACK
    # ====================

    # Catch-all with low priority
    - matches:
        - path: /
          priority: 100
      backendRefs:
        - name: default
          namespace: web
          port: 80
